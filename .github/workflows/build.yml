name: Build PyOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # tlačítko spustit ručně na GitHubu

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Instalace závislostí
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-common \
            mtools dosfstools python3

      - name: Sestavení PyOS ISO
        run: |
          sudo python3 build_os.py

      - name: Upload ISO jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyOS-1.0-amd64
          path: ./PyOS-1.0-amd64.iso
          retention-days: 30

      - name: Vytvoření GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0-alpha
          name: PyOS 1.0 Alpha
          draft: false
          prerelease: true
          files: ./PyOS-1.0-amd64.iso
          body: |
            PyOS 1.0 Alpha — automaticky sestaveno GitHub Actions

            A lightweight Linux distribution built on Debian Bookworm with XFCE4 desktop.
            Note: GRUB boot menu is in Czech, the rest of the system is in English.

            ## System Requirements
            - CPU: AMD64 / 64-bit processor
            - RAM: 4 GB recommended (2 GB minimum)
            - VRAM: 200 MB minimum
            - Storage: 20 GB (for install) or Live USB

            ## Default Login
            - Username: `user`
            - Password: `pyos123`

            ## How to run
            Flash to USB with Rufus or balenaEtcher, or run in VirtualBox.

            Built with PyOS Builder v2.0 (single Python script)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
